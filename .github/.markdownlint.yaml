# markdownlint configuration for AmphiLoop
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Allow long lines — markdown content files often have long lines
MD013: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow inline HTML (used in README badges, tables, etc.)
MD033: false

# Allow bare URLs
MD034: false

# Allow multiple blank lines (common in structured docs)
MD012: false

# Allow trailing punctuation in headings
MD026: false

# Allow lists without surrounding blank lines (common in structured agent/command docs)
MD032: false

# Allow fenced code blocks without surrounding blank lines
MD031: false

# Allow fenced code blocks without language specifier
MD040: false

# Allow emphasis used as headings (intentional in command docs)
MD036: false

# Allow flexible table column spacing
MD060: false

# Allow flexible unordered list indentation
MD007: false
