# Skill Manifest — defines where each skill is synced from.
#
# Each [section] is a skill name (= local directory under skills/).
# Skills sharing the same repo+ref are downloaded as a single archive.
#
# Fields:
#   repo     = GitHub repository (owner/name)
#   ref      = Git ref (tag, branch, or SHA)
#   path     = Source directory path within the repo
#   preserve = Comma-separated local paths to keep during sync (optional)

[bridgic-browser]
repo = bitsky-tech/bridgic-browser
ref  = hotfix/interactive-snapshot-text-labels
path = skills/bridgic-browser

[bridgic-amphibious]
repo = bitsky-tech/bridgic
ref  = feature/bridgic-amphibious-scaffolding
path = skills/bridgic-amphibious

[bridgic-llms]
repo = bitsky-tech/bridgic
ref  = feature/bridgic-amphibious-scaffolding
path = skills/bridgic-llms
